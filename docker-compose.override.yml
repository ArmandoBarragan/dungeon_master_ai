# Local development overrides (merged automatically by `docker compose up`).
# Mounts source code into the container and enables uvicorn hot reload.
# stdin/tty allow pdb/breakpoint() — when execution stops, attach with:
#   docker compose attach web

services:
  web:
    stdin_open: true
    tty: true
    restart: "no"
    volumes:
      - .:/app
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8001",
        "--reload",
        "--reload-dir",
        "/app/app",
      ]
